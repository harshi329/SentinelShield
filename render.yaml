services:
  - type: web
    name: sentinelshield
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false   # Set this manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_USER
        sync: false   # Set this manually in Render dashboard
      - key: EMAIL_PASS
        sync: false   # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # Set to your Render URL after first deploy
